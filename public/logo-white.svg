<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">

  <!-- Full background so white text is visible on any surface -->
  <rect width="300" height="80" rx="12" fill="#1B2848"/>

  <!-- ═══ ICON MARK (80×80) ═══ -->

  <!-- Icon square (slightly lifted from the bg) -->
  <rect width="80" height="80" rx="10" fill="#1B2848"/>
  <rect width="80" height="80" rx="10" fill="white" fill-opacity="0.07"/>

  <!-- Garage door panel (semi-transparent white) -->
  <rect x="10" y="12" width="60" height="58" rx="3" fill="white" fill-opacity="0.13"/>

  <!-- Horizontal panel lines -->
  <line x1="10" y1="26.5" x2="70" y2="26.5" stroke="white" stroke-opacity="0.18" stroke-width="1.5"/>
  <line x1="10" y1="41"   x2="70" y2="41"   stroke="white" stroke-opacity="0.18" stroke-width="1.5"/>
  <line x1="10" y1="55.5" x2="70" y2="55.5" stroke="white" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Trident (amber) -->
  <path
    d="
      M 29.5 19
      L 32 24  L 32 34
      L 38 34  L 38 21  L 40.5 16
      L 43 21  L 43 34
      L 49 34  L 49 24  L 51.5 19
      L 54 24  L 54 36
      L 43 36  L 43 68  Q 43 70 40.5 70  Q 38 70 38 68
      L 38 36  L 27 36  L 27 24
      Z
    "
    fill="#C87830"
  />

  <!-- ═══ WORDMARK ═══ -->

  <!-- "TRITON" — white -->
  <text
    x="190" y="48"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="35"
    font-weight="800"
    fill="white"
    letter-spacing="-0.5"
  >TRITON</text>

  <!-- "GARAGE DOORS" — light steel blue, matching the header accent -->
  <text
    x="190" y="68"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#C8D8F0"
    letter-spacing="3.5"
  >GARAGE DOORS</text>

</svg>
