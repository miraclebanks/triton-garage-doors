<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">

  <!-- Full white background so logo is self-contained -->
  <rect width="300" height="80" rx="12" fill="#FFFFFF"/>

  <!-- ═══ ICON MARK (80×80) ═══ -->

  <!-- Navy background square -->
  <rect width="80" height="80" rx="10" fill="#1B2848"/>

  <!-- Garage door panel (cream/warm white) -->
  <rect x="10" y="12" width="60" height="58" rx="3" fill="#F2EDE6"/>

  <!-- Horizontal panel lines — subtle warm gray -->
  <line x1="10" y1="26.5" x2="70" y2="26.5" stroke="#DDD9D0" stroke-width="1.5"/>
  <line x1="10" y1="41"   x2="70" y2="41"   stroke="#DDD9D0" stroke-width="1.5"/>
  <line x1="10" y1="55.5" x2="70" y2="55.5" stroke="#DDD9D0" stroke-width="1.5"/>

  <!--
    Trident (amber) — centered at x≈40.5, spans x=27–54, y=16–70
    Three prongs (5px wide ea.), bridge at y=34–36, handle to door bottom.

    Path traces outer perimeter clockwise from left-prong tip:
  -->
  <path
    d="
      M 29.5 19
      L 32 24  L 32 34
      L 38 34  L 38 21  L 40.5 16
      L 43 21  L 43 34
      L 49 34  L 49 24  L 51.5 19
      L 54 24  L 54 36
      L 43 36  L 43 68  Q 43 70 40.5 70  Q 38 70 38 68
      L 38 36  L 27 36  L 27 24
      Z
    "
    fill="#C87830"
  />

  <!-- ═══ WORDMARK ═══ -->

  <!-- "TRITON" — large, extra-bold, navy -->
  <text
    x="96" y="48"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="35"
    font-weight="800"
    fill="#1B2848"
    letter-spacing="-0.5"
  >TRITON</text>

  <!-- "GARAGE DOORS" — small, tracked out, navy -->
  <text
    x="99" y="68"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#1B2848"
    letter-spacing="3.5"
  >GARAGE DOORS</text>

</svg>
